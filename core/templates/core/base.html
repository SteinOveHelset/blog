<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <title>{% block title %}{% endblock %} | My Blog</title>
    </head>

    <body>
        <nav class="py-6 px-12 bg-slate-800 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold uppercase text-white">My blog</a>

            <a href="/" class="text-white font-bold">Home</a>
        </nav>

        <main class="py-6 px-12">
            {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                        <div class="px-4 py-3 rounded text-sm
                            {% if message.tags == 'success' %}bg-green-100 text-green-800
                            {% elif message.tags == 'error' %}bg-red-100 text-red-800
                            {% else %}bg-blue-100 text-blue-800{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
